name: fisiocare
description: Aplikasi Fisioterapi - FisioCare
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  supabase_flutter: ^2.5.6
  cupertino_icons: ^1.0.6
  http: ^1.2.1
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  intl: ^0.19.0
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1
  google_maps_flutter: ^2.7.0
  geolocator: ^12.0.0
  url_launcher: ^6.3.0
  file_picker: ^8.1.2
  dio: ^5.7.0
  flutter_local_notifications: ^17.2.3
  timeago: ^3.6.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  table_calendar: ^3.1.2
  fl_chart: ^0.69.0
  permission_handler: ^11.3.1
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
